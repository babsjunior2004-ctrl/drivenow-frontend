name: 🎨 DriveNow Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Build Vite ──────────────────────────────────────────────────────
  build:
    name: 🔨 Build React/Vite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🏗️ Build de production
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000/api' }}

      - name: ✅ Build réussi
        run: echo "Le frontend DriveNow compile correctement !"

      - name: 📤 Upload artifact du build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── Job 2 : Docker Build ────────────────────────────────────────────────────
  docker:
    name: 🐳 Build Image Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build et Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/drivenow-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/drivenow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
